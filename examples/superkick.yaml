version: 1

issue_source:
  provider: linear
  trigger: in_progress

runner:
  mode: local
  base_branch: main
  setup_commands:
    - cargo build

# SUP-104: project-level registry of MCP servers a role may opt into.
# Roles never get MCP access by default — they must name a server here
# AND list it under their `mcp.servers` allowlist. The hosted Linear MCP
# is auto-injected when any role uses the legacy
# `linear_context: snapshot_plus_mcp` shortcut, so simple Linear-only
# setups don't need to declare it.
mcp_servers:
  linear:
    type: http
    url: https://mcp.linear.app/mcp
    # `env_passthrough` lists env-var NAMES; values are resolved at
    # spawn time and never persisted on the audit row. Empty here —
    # the hosted Linear MCP authenticates via the user's OAuth session.
    env_passthrough: []

agents:
  planner:
    provider: claude
    role: planner
    system_prompt: |
      You are the planner. Produce a detailed plan before any code changes.
    budget:
      timeout_secs: 900
    # Planner benefits from live Linear lookups for sibling/child issues.
    # The shortcut below desugars to:
    #   mcp:
    #     mode: servers
    #     servers: [linear]
    # without needing the explicit block.
    linear_context: snapshot_plus_mcp
    # Tool-policy precedence (SUP-104):
    #   - Legacy `tools: [...]` (informational pre-104) becomes
    #     `tool_policy.allow` when no explicit `allow` is set here.
    #   - An explicit `tool_policy.allow` always wins over the legacy field.
    #   - `tool_policy.deny` is independent — it composes with whichever
    #     allow source applies.
    tool_policy:
      # No allowlist → no tool restriction. Audit recorded, never enforced.
      require_approval: false
      persist_results: true
  coder:
    provider: claude
    role: coder
    # Coder gets a compact snapshot, no live MCP — keeps the worktree hermetic.
    linear_context: snapshot
  reviewer:
    provider: claude
    role: reviewer
    # Reviewer judges the diff, not the issue — no Linear context needed.
    linear_context: none
    # Explicit "no MCP" — equivalent to omitting the block entirely.
    mcp:
      mode: none
    tool_policy:
      # Reviewers should not modify state; deny-list the destructive tools.
      deny: [bash, write]
      persist_results: true

workflow:
  steps:
    - type: plan
      agent: planner
    - type: code
      agent: coder
    - type: commands
      run:
        - cargo test
        - cargo clippy -- -D warnings
    - type: review_swarm
      agents: [reviewer, reviewer]
    - type: pr
      create: true

interrupts:
  on_blocked: ask_human

launch_profile:
  use_worktree: true
  live_mode: false
  skills: []
  default_instructions: ""
  handoff_instructions: ""
  # Subset of the agent catalog this project is allowed to spawn.
  # Omit or set to null to allow every role in the catalog.
  allowed_agents: [planner, coder, reviewer]

# SUP-73 — heartbeat-driven recovery. The scheduler annotates non-terminal
# runs as Stalled when they exceed the per-state staleness ceiling. It never
# mutates a run; it only surfaces the annotation on the operator dashboard.
# Defaults live in `superkick_core::RecoveryConfig::default_thresholds` —
# the values below mirror those defaults so this example self-documents the
# section. Comment a line out to fall back to the core default for that key.
recovery:
  tick_interval_secs: 30
  thresholds_secs:
    queued: 120              # 2 min — undispatched runs surface fast
    preparing: 300           # 5 min
    planning: 600            # 10 min
    coding: 300              # 5 min
    running_commands: 600    # 10 min
    reviewing: 300           # 5 min
    opening_pr: 300          # 5 min
    waiting_human: 1800      # 30 min — long human-ask path
