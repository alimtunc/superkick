version: 1

issue_source:
  provider: linear
  trigger: in_progress

runner:
  mode: local
  base_branch: main
  setup_commands:
    - cargo build

agents:
  planner:
    provider: claude
    role: planner
    system_prompt: |
      You are the planner. Produce a detailed plan before any code changes.
    budget:
      timeout_secs: 900
    # Planner benefits from live Linear lookups for sibling/child issues.
    linear_context: snapshot_plus_mcp
  coder:
    provider: claude
    role: coder
    # Coder gets a compact snapshot, no live MCP — keeps the worktree hermetic.
    linear_context: snapshot
  reviewer:
    provider: claude
    role: reviewer
    # Reviewer judges the diff, not the issue — no Linear context needed.
    linear_context: none

workflow:
  steps:
    - type: plan
      agent: planner
    - type: code
      agent: coder
    - type: commands
      run:
        - cargo test
        - cargo clippy -- -D warnings
    - type: review_swarm
      agents: [reviewer, reviewer]
    - type: pr
      create: true

interrupts:
  on_blocked: ask_human

launch_profile:
  use_worktree: true
  live_mode: false
  skills: []
  default_instructions: ""
  handoff_instructions: ""
  # Subset of the agent catalog this project is allowed to spawn.
  # Omit or set to null to allow every role in the catalog.
  allowed_agents: [planner, coder, reviewer]

# SUP-73 — heartbeat-driven recovery. The scheduler annotates non-terminal
# runs as Stalled when they exceed the per-state staleness ceiling. It never
# mutates a run; it only surfaces the annotation on the operator dashboard.
# Defaults live in `superkick_core::RecoveryConfig::default_thresholds` —
# the values below mirror those defaults so this example self-documents the
# section. Comment a line out to fall back to the core default for that key.
recovery:
  tick_interval_secs: 30
  thresholds_secs:
    queued: 120              # 2 min — undispatched runs surface fast
    preparing: 300           # 5 min
    planning: 600            # 10 min
    coding: 300              # 5 min
    running_commands: 600    # 10 min
    reviewing: 300           # 5 min
    opening_pr: 300          # 5 min
    waiting_human: 1800      # 30 min — long human-ask path
